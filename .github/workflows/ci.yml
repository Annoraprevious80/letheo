name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: cargo test + fmt + clippy (hermetic, offline)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (stable + rustfmt + clippy)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      # The Rust workspace is hermetic by design: no network, no embedding-model download
      # (CandleProvider loads from LETHEO_MODEL_DIR only at run-time, never in tests).
      - name: Format check
        run: cargo fmt --all -- --check

      - name: Clippy (warnings = errors)
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Test
        run: cargo test --workspace
